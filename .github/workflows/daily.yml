name: Daily Wuxing Report

on:
  schedule:
    - cron: '0 10 * * *'  # UTC 10:00 = 北京 18:00; GitHub Actions 通常延迟~4h，实际约 22:00 到达
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write  # 用于 commit+pushing week_log.json

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        id: report
        env:
          USERS: ${{ secrets.USERS }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_SMTP: ${{ vars.EMAIL_SMTP || 'smtp.qq.com' }}
          EMAIL_PORT: ${{ vars.EMAIL_PORT || '587' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SERVERCHAN_SCKEY: ${{ secrets.SERVERCHAN_SCKEY || '' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || '' }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '' }}
        run: python main.py

      - name: Notify failure
        if: failure()
        env:
          SCKEY: ${{ secrets.SERVERCHAN_SCKEY || '' }}
        run: |
          if [ -n "$SCKEY" ]; then
            curl -s "https://sctapi.ftqq.com/$SCKEY.send" \
              -d "title=❌ 五行日报发送失败" \
              -d "desp=GitHub Actions 运行失败，请检查：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
